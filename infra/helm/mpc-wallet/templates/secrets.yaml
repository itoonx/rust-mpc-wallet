# TEMPLATE ONLY — Do not commit real secrets to version control.
#
# In production, use one of:
#   - Sealed Secrets (Bitnami)
#   - External Secrets Operator (AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager)
#   - Helm install --set secrets.jwtSecret=<value>
#
# This template creates a Secret from values provided at install time.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mpc-wallet.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "mpc-wallet.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT signing secret for Bearer JWT authentication
  jwt_secret: {{ .Values.secrets.jwtSecret | quote }}
  # Encryption password for MPC node key stores (EncryptedFileStore)
  key_store_password: {{ .Values.secrets.keyStorePassword | quote }}
  # Gateway Ed25519 signing key seed (hex) — used to sign control messages
  gateway_signing_key: {{ .Values.secrets.gatewaySigningKey | quote }}
  {{- if .Values.secrets.nodeSigningKeys }}
  # Per-node Ed25519 signing key seeds (comma-separated hex)
  node_signing_keys: {{ .Values.secrets.nodeSigningKeys | quote }}
  {{- end }}
  {{- if .Values.secrets.sessionEncryptionKey }}
  # ChaCha20-Poly1305 key for encrypting sessions in Redis
  session_encryption_key: {{ .Values.secrets.sessionEncryptionKey | quote }}
  {{- end }}
